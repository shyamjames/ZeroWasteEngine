{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kochi Food-Waste Exchange</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, var(--sidebar-bg), #0f172a);
            color: white;
            flex-direction: column;
        }

        .login-card {
            background: white;
            color: var(--text-main);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div style="text-align: center; margin-bottom: 24px;">
        <h1 style="font-size: 2rem;">Kochi Eco-Engine 🌱</h1>
        <p style="color: #94a3b8; margin-top: 8px;">Municipal Resource Redistribution Platform</p>
    </div>

    <div class="login-card">
        <h2 style="margin-bottom: 24px; text-align: center;">Sign In</h2>

        {% if form.errors %}
        <p style="color: #ef4444; font-size: 0.85rem; text-align: center; margin-bottom: 16px;">
            Invalid username or password.
        </p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 16px; font-size: 1rem;">
                Secure Login
            </button>
            <input type="hidden" name="next" value="{{ next }}" />
        </form>

        <div style="text-align: center; margin-top: 24px; font-size: 0.8rem; color: var(--text-muted);">
            To configure accounts, contact Kochi Corporation IT.
        </div>
    </div>
</body>

</html>
