{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochi Food-Waste Exchange</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="brand">
                <h2>Kochi Eco-Engine</h2>
            </div>
            <ul class="nav-links">
                <li><a href="{% url 'dashboard' %}" class="active">Dashboard</a></li>
                {% if user.role == 'BUSINESS' %}
                    <li><a href="#">Waste Logs</a></li>
                    <li><a href="#">Compliance</a></li>
                {% endif %}
                <li><a href="/admin/">Settings (Admin)</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="user-info">
                    Logged in as <strong>{{ request.user.username }}</strong>
                    <span class="role-badge">{{ request.user.get_role_display }}</span>
                </div>
            </header>
            
            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <script>
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });
    </script>
</body>
</html>
